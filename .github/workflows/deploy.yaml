name: "Deploy Do11y to Github Pages"

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: "Test"
    uses: sq11y/typeach/.github/workflows/test.yaml@main

  build:
    name: "Build"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
      - name: "Setup environment"
        uses: ./.github/actions/setup-environment
      - name: "Setup pages"
        uses: actions/configure-pages@v4
      - name: "Build Do11y"
        run: pnpm docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
